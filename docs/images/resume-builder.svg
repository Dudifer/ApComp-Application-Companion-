<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="280" fill="#FAFAF8"/>

  <!-- CV Profile -->
  <rect x="20" y="100" width="110" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="75" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">CV profile</text>
  <text x="75" y="142" text-anchor="middle" font-size="10" fill="#633806">from database</text>

  <line x1="130" y1="130" x2="158" y2="130" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- buildInitialState -->
  <rect x="158" y="100" width="130" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="223" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">buildInitialState</text>
  <text x="223" y="142" text-anchor="middle" font-size="10" fill="#0F6E56">resumeUtils.ts</text>

  <line x1="288" y1="130" x2="316" y2="130" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Optional tailor -->
  <rect x="316" y="100" width="130" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="381" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Tailor (optional)</text>
  <text x="381" y="136" text-anchor="middle" font-size="10" fill="#534AB7">keyword scoring</text>
  <text x="381" y="152" text-anchor="middle" font-size="10" fill="#534AB7">hide low matches</text>

  <line x1="446" y1="130" x2="474" y2="130" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Builder UI -->
  <rect x="474" y="100" width="130" height="60" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="539" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#4A1B0C">Builder UI</text>
  <text x="539" y="136" text-anchor="middle" font-size="10" fill="#713B1D">drag · toggle · edit</text>
  <text x="539" y="152" text-anchor="middle" font-size="10" fill="#713B1D">live PDF preview</text>

  <line x1="604" y1="130" x2="632" y2="130" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Export -->
  <rect x="632" y="100" width="34" height="60" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="649" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#042C53">PDF</text>
  <text x="649" y="140" text-anchor="middle" font-size="9" fill="#185FA5">export</text>

  <!-- What buildInitialState produces -->
  <text x="340" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#5F5E5A">ResumeState contains →</text>

  <rect x="20" y="216" width="90" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="65" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#2C2C2A">Header</text>
  <text x="65" y="248" text-anchor="middle" font-size="9" fill="#5F5E5A">name · links</text>

  <rect x="122" y="216" width="100" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="172" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#2C2C2A">Experience</text>
  <text x="172" y="248" text-anchor="middle" font-size="9" fill="#5F5E5A">sortable · bullets</text>

  <rect x="234" y="216" width="100" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="284" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#2C2C2A">Projects</text>
  <text x="284" y="248" text-anchor="middle" font-size="9" fill="#5F5E5A">structured · bullets</text>

  <rect x="346" y="216" width="100" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="396" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#2C2C2A">Skills</text>
  <text x="396" y="248" text-anchor="middle" font-size="9" fill="#5F5E5A">grouped · editable</text>

  <rect x="458" y="216" width="100" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="508" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#2C2C2A">Education</text>
  <text x="508" y="248" text-anchor="middle" font-size="9" fill="#5F5E5A">institution · dates</text>

  <rect x="570" y="216" width="90" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="615" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#2C2C2A">About Me</text>
  <text x="615" y="248" text-anchor="middle" font-size="9" fill="#5F5E5A">editable text</text>
</svg>
