<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="320" fill="#FAFAF8"/>

  <!-- Step 1: Upload -->
  <rect x="20" y="120" width="110" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="75" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">Upload</text>
  <text x="75" y="162" text-anchor="middle" font-size="10" fill="#633806">PDF / DOCX</text>

  <line x1="130" y1="150" x2="158" y2="150" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: Parse -->
  <rect x="158" y="120" width="110" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="213" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Parse text</text>
  <text x="213" y="162" text-anchor="middle" font-size="10" fill="#0F6E56">pdf-parse / mammoth</text>

  <line x1="268" y1="150" x2="296" y2="150" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: Claude extraction -->
  <rect x="296" y="120" width="120" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="356" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Claude AI</text>
  <text x="356" y="162" text-anchor="middle" font-size="10" fill="#534AB7">Extract structured data</text>

  <line x1="416" y1="150" x2="444" y2="150" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: Gap Q&A -->
  <rect x="444" y="120" width="110" height="60" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="499" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#4A1B0C">Gap Q&amp;A</text>
  <text x="499" y="162" text-anchor="middle" font-size="10" fill="#713B1D">Fill missing detail</text>

  <line x1="554" y1="150" x2="582" y2="150" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 5: Save -->
  <rect x="582" y="120" width="80" height="60" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="622" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">Save</text>
  <text x="622" y="162" text-anchor="middle" font-size="10" fill="#185FA5">PostgreSQL</text>

  <!-- What Claude extracts (below) -->
  <text x="340" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#5F5E5A">Claude extracts →</text>

  <rect x="28" y="238" width="140" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="98" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">Roles</text>
  <text x="98" y="274" text-anchor="middle" font-size="10" fill="#5F5E5A">company · title · bullets</text>

  <rect x="180" y="238" width="140" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="250" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">Projects</text>
  <text x="250" y="274" text-anchor="middle" font-size="10" fill="#5F5E5A">name · tech · bullets</text>

  <rect x="332" y="238" width="140" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="402" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">Skills</text>
  <text x="402" y="274" text-anchor="middle" font-size="10" fill="#5F5E5A">category · experience</text>

  <rect x="484" y="238" width="168" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="568" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">Gap questions</text>
  <text x="568" y="274" text-anchor="middle" font-size="10" fill="#5F5E5A">grouped by employer</text>

  <!-- connector lines from Claude box down -->
  <line x1="356" y1="180" x2="98" y2="238" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="356" y1="180" x2="250" y2="238" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="356" y1="180" x2="402" y2="238" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="356" y1="180" x2="568" y2="238" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="3 3"/>
</svg>
