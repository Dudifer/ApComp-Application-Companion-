<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="260" fill="#FAFAF8"/>

  <!-- Page visit -->
  <rect x="20" y="90" width="110" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="75" y="114" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Page visit</text>
  <text x="75" y="132" text-anchor="middle" font-size="10" fill="#5F5E5A">dashboard load</text>

  <line x1="130" y1="120" x2="158" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Gmail check -->
  <rect x="158" y="90" width="120" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="218" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#412402">Gmail connected?</text>
  <text x="218" y="126" text-anchor="middle" font-size="10" fill="#633806">&gt;24h since scrape?</text>
  <text x="218" y="142" text-anchor="middle" font-size="9" fill="#BA7517">both must be true</text>

  <line x1="278" y1="120" x2="306" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="292" y="113" text-anchor="middle" font-size="9" fill="#888">yes</text>

  <!-- Fetch emails -->
  <rect x="306" y="90" width="120" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="366" y="114" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Fetch emails</text>
  <text x="366" y="132" text-anchor="middle" font-size="10" fill="#0F6E56">last 12 months</text>

  <line x1="426" y1="120" x2="454" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Keyword parse -->
  <rect x="454" y="90" width="120" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="514" y="114" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Parse status</text>
  <text x="514" y="132" text-anchor="middle" font-size="10" fill="#534AB7">keyword matching</text>

  <line x1="574" y1="120" x2="602" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Save -->
  <rect x="602" y="90" width="60" height="60" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="632" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">Save</text>
  <text x="632" y="132" text-anchor="middle" font-size="9" fill="#185FA5">to DB</text>

  <!-- Status table -->
  <rect x="20" y="175" width="640" height="70" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="340" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">Status detection keywords</text>

  <text x="60"  y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#3C3489">SUBMITTED</text>
  <text x="60"  y="230" text-anchor="middle" font-size="9" fill="#5F5E5A">"thank you"</text>

  <text x="165" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">INTERVIEW</text>
  <text x="165" y="230" text-anchor="middle" font-size="9" fill="#5F5E5A">"schedule"</text>

  <text x="265" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">ASSESSMENT</text>
  <text x="265" y="230" text-anchor="middle" font-size="9" fill="#5F5E5A">"challenge"</text>

  <text x="375" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#412402">OFFER</text>
  <text x="375" y="230" text-anchor="middle" font-size="9" fill="#5F5E5A">"pleased to offer"</text>

  <text x="480" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#7E1F1F">REJECTED</text>
  <text x="480" y="230" text-anchor="middle" font-size="9" fill="#5F5E5A">"unfortunately"</text>

  <text x="600" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#5F5E5A">AUTO-REJECT</text>
  <text x="600" y="230" text-anchor="middle" font-size="9" fill="#5F5E5A">60d no update</text>
</svg>
