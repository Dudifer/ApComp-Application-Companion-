<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#FAFAF8"/>

  <!-- Monorepo container -->
  <rect x="20" y="16" width="640" height="272" rx="16" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="340" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">ApComp — Turborepo + pnpm workspaces</text>

  <!-- apps/web -->
  <rect x="44" y="64" width="160" height="76" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="124" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">apps/web</text>
  <text x="124" y="114" text-anchor="middle" font-size="11" fill="#534AB7">React 19 + Vite · :5173</text>
  <text x="124" y="130" text-anchor="middle" font-size="10" fill="#7F77DD">dnd-kit · @react-pdf</text>

  <!-- apps/api -->
  <rect x="260" y="64" width="160" height="76" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">apps/api</text>
  <text x="340" y="114" text-anchor="middle" font-size="11" fill="#0F6E56">NestJS 11 · :3000</text>
  <text x="340" y="130" text-anchor="middle" font-size="10" fill="#1D9E75">Prisma · Axios</text>

  <!-- apps/extension -->
  <rect x="476" y="64" width="160" height="76" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="556" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">apps/extension</text>
  <text x="556" y="114" text-anchor="middle" font-size="11" fill="#713B1D">Chrome Extension</text>
  <text x="556" y="130" text-anchor="middle" font-size="10" fill="#993C1D">content.js · autofill.js</text>

  <!-- REST arrows -->
  <line x1="204" y1="102" x2="258" y2="102" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="231" y="95" text-anchor="middle" font-size="10" fill="#888">REST</text>
  <line x1="476" y1="102" x2="422" y2="102" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="449" y="95" text-anchor="middle" font-size="10" fill="#888">REST</text>

  <!-- packages/types -->
  <rect x="220" y="200" width="240" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="340" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">packages/types</text>
  <text x="340" y="244" text-anchor="middle" font-size="11" fill="#633806">Shared TypeScript interfaces</text>

  <!-- import arrows -->
  <line x1="124" y1="140" x2="268" y2="200" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="340" y1="140" x2="340" y2="200" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="556" y1="140" x2="412" y2="200" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Bottom row -->
  <!-- PostgreSQL -->
  <rect x="40" y="316" width="175" height="60" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="127" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">PostgreSQL 16</text>
  <text x="127" y="359" text-anchor="middle" font-size="11" fill="#185FA5">Docker · Prisma ORM</text>

  <!-- Job APIs -->
  <rect x="252" y="316" width="175" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="339" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Job APIs</text>
  <text x="339" y="359" text-anchor="middle" font-size="11" fill="#5F5E5A">Adzuna · JSearch</text>

  <!-- Services -->
  <rect x="464" y="316" width="175" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="551" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Services</text>
  <text x="551" y="359" text-anchor="middle" font-size="11" fill="#5F5E5A">Claude · Gmail · Hunter.io</text>

  <!-- API to bottom -->
  <line x1="315" y1="288" x2="190" y2="316" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow-blue)"/>
  <line x1="340" y1="288" x2="340" y2="316" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="365" y1="288" x2="490" y2="316" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
