<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="300" fill="#FAFAF8"/>

  <!-- CV Profile -->
  <rect x="20" y="110" width="110" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="75" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">CV profile</text>
  <text x="75" y="152" text-anchor="middle" font-size="10" fill="#633806">skills · titles</text>

  <line x1="130" y1="140" x2="158" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Query builder -->
  <rect x="158" y="110" width="115" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="215" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Query builder</text>
  <text x="215" y="152" text-anchor="middle" font-size="10" fill="#5F5E5A">from real profile</text>

  <!-- Fork to Adzuna and JSearch -->
  <line x1="273" y1="128" x2="316" y2="90" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="273" y1="152" x2="316" y2="190" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Adzuna -->
  <rect x="316" y="60" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="371" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Adzuna</text>
  <text x="371" y="98" text-anchor="middle" font-size="10" fill="#534AB7">250/mo free</text>

  <!-- JSearch -->
  <rect x="316" y="170" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="371" y="190" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">JSearch</text>
  <text x="371" y="208" text-anchor="middle" font-size="10" fill="#534AB7">200/mo free</text>

  <!-- Merge to dedupe -->
  <line x1="426" y1="85" x2="462" y2="128" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="426" y1="195" x2="462" y2="152" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Dedupe + enrich -->
  <rect x="462" y="110" width="115" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="519" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Dedupe + enrich</text>
  <text x="519" y="152" text-anchor="middle" font-size="10" fill="#0F6E56">Clearbit domains</text>

  <line x1="577" y1="140" x2="605" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- AI Filter -->
  <rect x="605" y="110" width="62" height="60" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="636" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#4A1B0C">AI filter</text>
  <text x="636" y="152" text-anchor="middle" font-size="9" fill="#713B1D">0–100 score</text>

  <!-- Save to DB and disk (below) -->
  <line x1="605" y1="155" x2="460" y2="220" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="610" y1="170" x2="570" y2="220" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <rect x="360" y="220" width="140" height="44" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="430" y="239" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">PostgreSQL</text>
  <text x="430" y="256" text-anchor="middle" font-size="10" fill="#185FA5">7-day TTL per job</text>

  <rect x="510" y="220" width="150" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="585" y="239" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">Disk cache</text>
  <text x="585" y="256" text-anchor="middle" font-size="10" fill="#5F5E5A">raw-jobs.json fallback</text>
</svg>
