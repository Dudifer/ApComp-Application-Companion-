<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Save to ApComp</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="ap-header">
      <div class="ap-logo">Ap<span>Comp</span></div>
      <button id="settings-btn" type="button" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <section id="settings-panel" class="ap-section ap-section--settings hidden">
      <label>
        <span>API base URL</span>
        <input id="api-base" type="url" placeholder="http://localhost:3000" />
      </label>
      <label>
        <span>Web app URL</span>
        <input id="web-base" type="url" placeholder="http://localhost:5173" />
      </label>
      <button id="save-settings" class="ap-btn ap-btn--secondary" type="button">Save</button>
    </section>

    <nav class="ap-tabs">
      <button id="tab-capture" class="ap-tab ap-tab--active" type="button" data-tab="capture">Save job</button>
      <button id="tab-autofill" class="ap-tab" type="button" data-tab="autofill">Auto-fill</button>
    </nav>

    <!-- ============ Capture (existing) ============ -->
    <section id="capture-panel" class="ap-section">
      <div id="status" class="ap-status">Extracting…</div>

      <label>
        <span>Title <em>*</em></span>
        <input id="f-title" type="text" required />
      </label>
      <label>
        <span>Company <em>*</em></span>
        <input id="f-company" type="text" required />
      </label>
      <label>
        <span>URL</span>
        <input id="f-url" type="url" required />
      </label>
      <label>
        <span>Location</span>
        <input id="f-location" type="text" placeholder="e.g. San Francisco, CA" />
      </label>
      <div class="ap-row">
        <label class="ap-grow">
          <span>Salary min</span>
          <input id="f-salary-min" type="number" min="0" step="1000" />
        </label>
        <label class="ap-grow">
          <span>Salary max</span>
          <input id="f-salary-max" type="number" min="0" step="1000" />
        </label>
      </div>
      <label class="ap-row ap-row--checkbox">
        <input id="f-remote" type="checkbox" />
        <span>Remote</span>
      </label>
      <label>
        <span>Description</span>
        <textarea id="f-description" rows="4"></textarea>
      </label>

      <div class="ap-actions">
        <button id="save-btn" class="ap-btn" type="button">Save to ApComp</button>
      </div>
    </section>

    <!-- ============ Auto-fill ============ -->
    <section id="autofill-panel" class="ap-section hidden">
      <div id="autofill-status" class="ap-status">
        Click below to fill out the application on the current tab using your uploaded CV.
      </div>

      <div class="ap-actions ap-actions--column">
        <button id="autofill-btn" class="ap-btn" type="button">Auto-fill this application</button>
      </div>

      <div id="autofill-result" class="ap-autofill-result hidden">
        <div class="ap-autofill-result__line"><strong>Roles filled:</strong> <span id="r-roles">0</span></div>
        <div class="ap-autofill-result__line"><strong>Other fields:</strong> <span id="r-other">0</span></div>
        <div class="ap-autofill-result__line"><strong>Skipped:</strong> <span id="r-skipped">0</span></div>
        <details>
          <summary>Details</summary>
          <pre id="r-details"></pre>
        </details>
      </div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
